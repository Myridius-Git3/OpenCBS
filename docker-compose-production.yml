# Production Docker Compose for OpenCBS on Ubuntu EC2
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in every value.
#   2. Run:
#        docker compose -f docker-compose-production.yml up -d --build
#
# Secrets are read exclusively from the .env file — never hard-coded here.

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    # Do NOT expose port 5432 to the host on a production EC2 instance.
    # Use a bastion / SSH tunnel if direct DB access is required.

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-alpine        # no management UI in production
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    # Port 5672 and the management port 15672 are intentionally NOT published
    # to the host; the api container reaches RabbitMQ over the internal network.

  # ── Spring Boot API ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: server/opencbs-server/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JAVA_OPTS: >-
        -Djava.security.egd=file:/dev/./urandom
        -Xms256m
        -Xmx${API_HEAP_MAX:-512m}
    volumes:
      - ${HOME}/opencbs_templates:/app/templates:ro
      - attachments_data:/app/attachments
    expose:
      - "8080"
    networks:
      - backend
      - frontend
    healthcheck:
      #test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/info || exit 1"]
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: ${API_MEMORY_LIMIT:-768M}
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Angular + Nginx frontend ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: always
    ports:
      - "9000:80"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./client/default-prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend:
    driver: bridge
    internal: true          # db and rabbitmq are not reachable from the host
  frontend:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  attachments_data:
