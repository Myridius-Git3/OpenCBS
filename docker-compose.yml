services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: opencbs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "15672:15672"   # Management UI → http://localhost:15672  (guest / guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot API ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: server/opencbs-server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./server/templates:/app/templates
      - ./server/attachments:/app/attachments
    expose:
      - "8080"

  # ── Angular + Nginx frontend ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"         # App → http://localhost
    depends_on:
      - api

volumes:
  postgres_data:
