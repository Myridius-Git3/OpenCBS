spring.datasource.url=jdbc:postgresql://db:5432/opencbs
# username and password are injected at runtime via SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
server.port=8080
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate Envers: audit tables are created by Flyway in the `audit` schema with
# a `_history` suffix (e.g. audit.profiles_history). Without these two properties
# Envers falls back to its default naming (<table>_aud in the default schema), so
# every write to an audited entity fails with:
#   org.hibernate.exception.SQLGrammarException: relation "<table>_aud" does not exist
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_history
spring.jpa.properties.org.hibernate.envers.default_schema=audit
template.location=/app/templates
attachment.location=/app/attachments

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=opencbs@localhost
email.sender=OpenCBS
day-closure.auto-start=false
day-closure.auto-start-time=0 0 0 * * ?

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.front-host=rabbitmq
spring.rabbitmq.port=5672
# username and password are injected at runtime via SPRING_RABBITMQ_USERNAME / SPRING_RABBITMQ_PASSWORD
spring.rabbitmq.virtual-host=/
spring.rabbitmq.direct-exchange=opencbs.direct
spring.rabbitmq.fanout-exchange=opencbs.fanout
account-balance-calculation.exchange=opencbs.balance
account-balance-calculation.queue=balance.calculation
account-balance-calculation.routing-key=balance.calculation

task-executor.min-pool-size=2
task-executor.max-pool-size=10
